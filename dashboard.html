<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modbus → OPC UA Gateway</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0f1a;
      --surface:  #131929;
      --border:   #1e2d45;
      --accent:   #3b82f6;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --text:     #e2e8f0;
      --muted:    #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: .5px; }
    header h1 span { color: var(--accent); }

    #status-badge {
      display: flex; align-items: center; gap: 8px;
      font-size: .85rem; color: var(--muted);
    }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 0 transparent;
      transition: background .3s;
    }
    #status-dot.online {
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
      70%  { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    /* ── Layout ────────────────────────────────── */
    main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

    section + section { margin-top: 32px; }
    .section-title {
      font-size: .75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted); margin-bottom: 16px;
    }

    /* ── Sensor cards ──────────────────────────── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 24px;
      position: relative;
      transition: border-color .2s;
    }
    .card.alarm { border-color: var(--red); }
    .card.alarm::after {
      content: "⚠ ТРЕВОГА";
      position: absolute; top: 14px; right: 14px;
      background: var(--red); color: #fff;
      font-size: .65rem; font-weight: 700; letter-spacing: .5px;
      padding: 3px 8px; border-radius: 6px;
    }

    .card-label { font-size: .8rem; color: var(--muted); margin-bottom: 8px; }
    .card-value {
      font-size: 2.4rem; font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .card-unit { font-size: 1rem; font-weight: 400; color: var(--muted); margin-left: 4px; }
    .card-time { font-size: .75rem; color: var(--muted); margin-top: 10px; }

    /* ── Charts ────────────────────────────────── */
    .charts { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }

    .chart-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .chart-box h3 { font-size: .85rem; font-weight: 600; margin-bottom: 14px; color: var(--muted); }
    .chart-box canvas { max-height: 180px; }

    /* ── History table ─────────────────────────── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead th {
      background: #0f1929;
      padding: 10px 16px;
      text-align: left;
      font-size: .72rem; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(59,130,246,.06); }
    tbody td { padding: 9px 16px; }
    .val-alarm { color: var(--red); font-weight: 600; }

    /* ── Controls ──────────────────────────────── */
    .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .controls label { font-size: .82rem; color: var(--muted); }
    select, button {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 6px 12px;
      font-size: .82rem; cursor: pointer;
    }
    button { background: var(--accent); border-color: var(--accent); font-weight: 600; }
    button:hover { opacity: .85; }
  </style>
</head>
<body>

<header>
  <h1>Modbus <span>→</span> OPC UA Gateway</h1>
  <div id="status-badge">
    <div id="status-dot"></div>
    <span id="status-text">Подключение...</span>
  </div>
</header>

<main>

  <!-- Sensor cards -->
  <section>
    <div class="section-title">Текущие показания</div>
    <div class="cards" id="cards">
      <div class="card"><div class="card-label">Загрузка...</div></div>
    </div>
  </section>

  <!-- Charts -->
  <section>
    <div class="section-title">Графики (последние 30 значений)</div>
    <div class="charts" id="charts"></div>
  </section>

  <!-- History -->
  <section>
    <div class="section-title">История</div>
    <div class="controls">
      <label>Сенсор:</label>
      <select id="hist-select"></select>
      <button onclick="loadHistory()">Обновить</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Время</th><th>Значение</th></tr></thead>
        <tbody id="hist-body"><tr><td colspan="2" style="padding:16px;color:var(--muted)">Выберите сенсор</td></tr></tbody>
      </table>
    </div>
  </section>

</main>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const POLL_MS   = 2000;
const MAX_POINTS = 30;
const COLORS = ["#3b82f6","#22c55e","#f59e0b","#a78bfa","#f472b6"];

// ── State ─────────────────────────────────────────────────────────────────
let charts      = {};   // { sensorName: Chart }
let seriesData  = {};   // { sensorName: number[] }
let seriesLabels = [];  // shared time labels
let sensorMeta  = {};   // { sensorName: {unit, description, alarm_max, alarm_min} }

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  const status = await safeFetch("/status");
  if (!status) return;

  // Populate sensor select
  const sel = document.getElementById("hist-select");
  for (const name of status.sensors) {
    const opt = document.createElement("option");
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
    seriesData[name] = [];
  }

  buildCharts(status.sensors);
  tick();
  setInterval(tick, POLL_MS);
}

// ── Main polling tick ─────────────────────────────────────────────────────
async function tick() {
  const data = await safeFetch("/data");
  if (!data) { setStatus(false); return; }

  setStatus(true);
  sensorMeta = {};
  for (const [name, info] of Object.entries(data)) sensorMeta[name] = info;

  renderCards(data);
  pushToCharts(data);
}

// ── Cards ─────────────────────────────────────────────────────────────────
function renderCards(data) {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  for (const [name, info] of Object.entries(data)) {
    const card = document.createElement("div");
    card.className = "card" + (info.alarm ? " alarm" : "");

    const val = info.value !== null ? info.value : "—";
    const time = info.timestamp
      ? new Date(info.timestamp).toLocaleTimeString("ru")
      : "";

    card.innerHTML = `
      <div class="card-label">${info.description || name}</div>
      <div class="card-value">${val}<span class="card-unit">${info.unit}</span></div>
      <div class="card-time">${time}</div>
    `;
    container.appendChild(card);
  }
}

// ── Charts ────────────────────────────────────────────────────────────────
function buildCharts(sensors) {
  const container = document.getElementById("charts");
  container.innerHTML = "";

  sensors.forEach((name, i) => {
    const box = document.createElement("div");
    box.className = "chart-box";
    box.innerHTML = `<h3>${name}</h3><canvas id="chart-${name}"></canvas>`;
    container.appendChild(box);

    const color = COLORS[i % COLORS.length];
    charts[name] = new Chart(document.getElementById(`chart-${name}`), {
      type: "line",
      data: {
        labels: seriesLabels,
        datasets: [{
          label: name,
          data: seriesData[name],
          borderColor: color,
          backgroundColor: color + "18",
          borderWidth: 2,
          pointRadius: 2,
          fill: true,
          tension: 0.35,
        }]
      },
      options: {
        animation: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: "#64748b", maxTicksLimit: 6 }, grid: { color: "#1e2d45" } },
          y: { ticks: { color: "#64748b" }, grid: { color: "#1e2d45" } }
        }
      }
    });
  });
}

function pushToCharts(data) {
  const time = new Date().toLocaleTimeString("ru");
  seriesLabels.push(time);
  if (seriesLabels.length > MAX_POINTS) seriesLabels.shift();

  for (const [name, info] of Object.entries(data)) {
    if (!seriesData[name]) seriesData[name] = [];
    seriesData[name].push(info.value);
    if (seriesData[name].length > MAX_POINTS) seriesData[name].shift();
    if (charts[name]) charts[name].update("none");
  }
}

// ── History table ─────────────────────────────────────────────────────────
async function loadHistory() {
  const name = document.getElementById("hist-select").value;
  if (!name) return;

  const data = await safeFetch(`/history/${name}`);
  if (!data) return;

  const meta = sensorMeta[name] || {};
  const tbody = document.getElementById("hist-body");
  tbody.innerHTML = "";

  if (!data.records.length) {
    tbody.innerHTML = `<tr><td colspan="2" style="padding:16px;color:var(--muted)">Нет данных</td></tr>`;
    return;
  }

  for (const rec of data.records.slice().reverse()) {
    const alarm = (
      (meta.alarm_min !== undefined && rec.value < meta.alarm_min) ||
      (meta.alarm_max !== undefined && rec.value > meta.alarm_max)
    );
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${new Date(rec.timestamp).toLocaleString("ru")}</td>
      <td class="${alarm ? "val-alarm" : ""}">${rec.value} ${data.unit}</td>
    `;
    tbody.appendChild(tr);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────
async function safeFetch(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.statusText);
    return await r.json();
  } catch {
    return null;
  }
}

function setStatus(online) {
  document.getElementById("status-dot").className = online ? "online" : "";
  document.getElementById("status-text").textContent = online ? "Онлайн" : "Нет связи";
}

init();
</script>
</body>
</html>
